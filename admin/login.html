<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Hanan Fusion</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');

    :root {
      --gold: #D4AF37;
      --gold-light: #F0D060;
      --black: #0a0a0a;
      --black-card: #111111;
      --black-mid: #161616;
      --glass-border: rgba(212, 175, 55, 0.15);
      --gray: #888;
      --white: #f0f0f0;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: float 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--gold);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 300px;
      height: 300px;
      background: #8B4513;
      bottom: -80px;
      right: -80px;
      animation-delay: 3s;
    }

    .orb-3 {
      width: 200px;
      height: 200px;
      background: var(--gold-light);
      top: 50%;
      right: 20%;
      animation-delay: 5s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-30px) scale(1.05);
      }
    }

    /* Login card */
    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(17, 17, 17, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(212, 175, 55, 0.1);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--gold), #8B6914);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.6rem;
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--white);
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 0.82rem;
      color: var(--gray);
    }

    .login-subtitle span {
      color: var(--gold);
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 0.85rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--white);
      font-size: 0.9rem;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    .form-input:focus+.input-icon,
    .input-wrap:focus-within .input-icon {
      color: var(--gold);
    }

    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 0;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .toggle-pass:hover {
      color: var(--gold);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), #8B6914);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      letter-spacing: 0.03em;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      display: none;
      background: rgba(231, 76, 60, 0.12);
      border: 1px solid rgba(231, 76, 60, 0.3);
      border-radius: 8px;
      color: #e74c3c;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      text-align: center;
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--gray);
    }

    .login-footer a {
      color: var(--gold);
      text-decoration: none;
    }

    /* Spinner */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
  </style>
</head>

<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🍽️</div>
      <div class="login-title">Hanan Fusion</div>
      <div class="login-subtitle">Admin Panel &nbsp;|&nbsp; <span>Secure Access</span></div>
    </div>

    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i> <span id="errorText">Invalid email or password.</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <input type="email" class="form-input" id="emailInput" placeholder="admin@hananfusion.com" required
            autocomplete="email">
          <i class="fas fa-envelope input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="passInput" placeholder="••••••••••••" required
            autocomplete="current-password">
          <i class="fas fa-lock input-icon"></i>
          <button type="button" class="toggle-pass" onclick="togglePassword()" id="eyeBtn">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner" id="spinner"></div>
        <span id="btnText"><i class="fas fa-sign-in-alt"></i> &nbsp;Sign In to Admin</span>
      </button>
    </form>

    <div class="login-footer">
      <a href="/"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script>
    // Initialize Supabase from APP_CONFIG (Vercel) or localStorage (fallback)
    const cfg = window.APP_CONFIG || {};
    const SUPA_URL = cfg.supabaseUrl || localStorage.getItem('SUPABASE_URL');
    const SUPA_KEY = cfg.supabaseAnonKey || localStorage.getItem('SUPABASE_ANON_KEY');

    let supabaseClient = null;
    if (SUPA_URL && SUPA_KEY && SUPA_URL !== 'YOUR_SUPABASE_URL_HERE') {
      supabaseClient = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    }

    // If already logged in, redirect to dashboard
    async function checkSession() {
      if (!supabaseClient) return;
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = '/admin';
      }
    }
    checkSession();

    function togglePassword() {
      const input = document.getElementById('passInput');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.style.display = 'block';
    }
    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    function setLoading(on) {
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      const text = document.getElementById('btnText');
      btn.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
      text.style.display = on ? 'none' : 'flex';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      if (!supabaseClient) {
        showError('Supabase is not configured. Please set up your keys first.');
        return;
      }

      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passInput').value;

      setLoading(true);
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        // Success — redirect to admin dashboard
        window.location.href = '/admin';
      } catch (err) {
        showError(err.message || 'Invalid email or password. Please try again.');
        setLoading(false);
      }
    });
  </script>

</body>

</html>
